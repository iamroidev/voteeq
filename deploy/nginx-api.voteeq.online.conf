# VoteEQ API on EC2 — nginx terminates SSL and proxies API to Node (pm2).
# Profile photos are served from disk by nginx (no separate CDN required).
#
# Optional: Cloudflare in front of api.voteeq.online for edge caching in Ghana.
# Not required — EC2 + nginx handles compression, storage, and photo delivery.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.voteeq.online;
    client_max_body_size 10M;

    # Serve compressed JPGs straight from disk (faster than proxying through Node)
    location /photos/ {
        alias /opt/voteeq/backend/photos/;
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        access_log off;
        try_files $uri =404;
    }

    location /banners/ {
        alias /opt/voteeq/backend/banners/;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
